# ============================================================================
#  Central config — the "dataset-driven checklist" lives here.
#  Change THIS file to retarget the tool without touching any Python code.
# ============================================================================

# Path to your trained YOLO weights. After training on Colab, download best.pt
# and drop it here. If missing, the app still runs (shows NA rows).
model_path: models/best.pt

# Detection confidence threshold (0-1). 0.30 = peak F1 from the trained model's
# F1-confidence curve. Lower = more boxes (more false positives).
conf_threshold: 0.30

# Unified detector classes. MUST match the order in the trained data.yaml.
# Final set after remapping the raw 635 Roboflow classes (see scripts/remap_dataset.py).
# NOTE: no title_block yet (not labeled). Hand-label it later to re-enable the
# drawing-number OCR check (commented out below).
classes:
  - dimension
  - note
  - gdt_symbol
  - surface_roughness

# Text/format rules (regex on the title_block OCR crop). Only used once a
# title_block class exists. Kept here for when you add it.
rules:
  drawing_number:
    description: "Drawing number present & format valid"
    pattern: '[A-Z]{2,3}[-\s]?\d?[-\s]?[A-Z]{2,4}[-\s]?\d{3,4}'
  date:
    pattern: '\d{2}/\d{2}/\d{2}'

# Surface-roughness Ra values allowed by the company spec (micron). Informational.
ra_allowed: [0.2, 0.4, 0.8, 1.6, 3.2, 6.3, 12.5]

# ---------------------------------------------------------------------------
# The checklist. Each item auto-evaluated from detections / rules.
#   presence          -> PASS if class detected >=1, else FAIL
#   presence_optional -> PASS if detected, else NA
#   count             -> PASS if >=1 (remark shows count), else FAIL
#   count_info        -> always INFO, remark shows count
#   rule              -> PASS/FAIL from regex on title_block OCR text
# ---------------------------------------------------------------------------
checklist:
  - id: 1
    point: "GD&T symbols present & located"
    type: count
    requires_class: gdt_symbol
  - id: 2
    point: "Surface-roughness symbols present & located"
    type: count
    requires_class: surface_roughness
  - id: 3
    point: "Dimensions detected"
    type: count_info
    requires_class: dimension
  - id: 4
    point: "Notes block present"
    type: presence_optional
    requires_class: note

  # --- re-enable after hand-labeling title_block ---
